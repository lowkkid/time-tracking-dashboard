<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>time-tracking-dashboard</title>
    <link href="./dist/output.css" rel="stylesheet">
    <link rel="icon" href="assets/icons/favicon-32x32.png">
    <script src="./script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300..900&display=swap" rel="stylesheet">
</head>
<body class="flex min-h-screen bg-navy-950 py-16">
<main class="m-auto flex flex-col gap-6 lg:flex-row lg:gap-8 lg:items-stretch">
    <header class="flex flex-col gap-6 overflow-hidden rounded-[15px] bg-navy-900 pb-[1.5625rem] lg:p-8 lg:max-w-[255px]">
        <div class="bg-purple-600 p-8 lg:-mt-8 lg:-mx-8 lg:rounded-b-[15px] lg:min-h-[354px]">
            <div class="flex items-center gap-6 lg:flex-col lg:items-start lg:gap-10">
                <img src="assets/icons/user.png" alt="user" class="h-16 w-16 rounded-full lg:w-[78px] lg:h-[78px]">
                <div class="flex flex-col gap-2 lg:gap-0">
                    <span class="text-6 text-navy-200">Report for</span>
                    <span class="text-4 text-white lg:text-2">Jeremy Robson</span>
                </div>
            </div>
        </div>
        <div id="filter-buttons" class="flex text-5-regular text-purple-500 justify-center lg:flex-col lg:items-start lg:gap-[21px]">
            <button type="button" id="daily" class="w-[109px] cursor-pointer hover:text-purple-600 lg:w-auto" data-active="true">Daily</button>
            <button type="button" id="weekly" class="w-[109px] cursor-pointer hover:text-purple-600 lg:w-auto" data-active="false">Weekly</button>
            <button type="button" id="monthly" class="w-[109px] cursor-pointer hover:text-purple-600 lg:w-auto" data-active="false">Monthly</button>
        </div>
    </header>
    <section>
        <ul id="data-list" class="grid grid-cols-1 gap-6 md:grid-cols-3 lg:h-full">
        </ul>
    </section>
</main>
</body>
</html>
